services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: memoriesphotos-app
    ports:
      - "3003:3003"
    environment:
      - DATABASE_URL=file:/app/data/prod.db
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    volumes:
      - app_data:/app/data
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:latest
    container_name: redis-dev
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
  app_data:
